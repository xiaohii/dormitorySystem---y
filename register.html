<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>管理员注册</title>
    <link rel="stylesheet" href="css/app.css">
</head>
<body class="login-body">
<div class="login-card" style="max-width:860px;">
    <section class="login-intro">
        <h1>创建管理员账号</h1>
        <p>该页面用于创建系统管理员账号。</p>
        <p>注册完成后可使用管理员或宿管角色登录。</p>
        <p>建议注册后返回登录页验证账号。</p>
    </section>

    <section class="login-form">
        <h2>提交注册</h2>
        <div id="errorBox" class="alert" style="display:none;"></div>
        <form action="register.php" method="post">
            <div class="field">
                <label for="user">用户名</label>
                <input id="user" name="user" required>
            </div>
            <div class="field">
                <label for="pwd1">密码</label>
                <input id="pwd1" name="pwd1" type="password" required>
            </div>
            <div class="field">
                <label for="pwd2">确认密码</label>
                <input id="pwd2" name="pwd2" type="password" required>
            </div>
            <div class="login-actions">
                <button class="btn btn-primary" type="submit">提交注册</button>
                <a class="btn btn-muted" href="login.html" style="text-align:center;line-height:20px;">返回登录</a>
            </div>
        </form>
    </section>
</div>

<script>
(function () {
    var params = new URLSearchParams(window.location.search);
    var error = params.get('error');
    if (!error) return;

    var box = document.getElementById('errorBox');
    box.style.display = 'block';
    box.textContent = error;
})();
</script>
</body>
</html>
